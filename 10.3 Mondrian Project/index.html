<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mondrian Project</title>
    <style>
      /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: 
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!

    */
      .container {
        display: grid;
        background-color: #f0f1ec;
        width: 748px;
        height: 748px;
        grid-template-columns: 320px 198px 153px 50px;
        grid-template-rows: 414px 130px 155px 20px;
      }

      .box1 {
        background-color: Red;
        grid-area: 1 / 1 / 2 / 2;
        border-right: solid 9px black;
        border-bottom: solid 9px black;
      }
      .box2 {
        grid-area: 1 / 2 / 2 / 5;
        border-bottom: solid 9px black;
        grid-column-start: 2;
        grid-column-end: 5;
      }
      .box3 {
        grid-area: 2 / 1 / 4 / 2;
        border-right: solid 9px black;
        border-bottom: solid 9px black;
      }
      .box4 {
        grid-area: 2 / 2 / 4 / 4;
        border-right: solid 9px black;
        border-bottom: solid 9px black;
      }
      .box5 {
        background-color: #004592;
        grid-area: 2 / 4 / 3 / 5;
        border-bottom: solid 10px black;
        border-top: solid 10px black;
      }
      .box6 {
        grid-area: 4 / 1 / 5 / 2;
      }
      .box7 {
        background-color: #f9d01e;
        grid-area: 4 / 2 / 5 / 3;
        border-left: 9px;
        border-right: 9px;
      }
      .box8 {
        background-color: #232629;
        grid-area: 4 / 3 / 5 / 4;
        border-right: solid 10px black;
      }
      .box9 {
        border-top: solid 10px black;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
      <div class="box4"></div>
      <div class="box4"></div>
      <div class="box5"></div>
      <div class="box7"></div>
      <div class="box8"></div>
      <div class="box9"></div>
    </div>
  </body>
</html>
